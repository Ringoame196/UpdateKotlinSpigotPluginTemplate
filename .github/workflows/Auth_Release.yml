name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        shell: bash
        run: |
          git fetch --tags

          latest=$(git tag --list "ver*" --sort=-version:refname | head -n 1)

          if [ -z "$latest" ]; then
            next="ver1.0.0"
          else
            version=${latest#ver}
            IFS='.' read major minor patch <<< "$version"
            patch=$((patch + 1))
            next="ver${major}.${minor}.${patch}"
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next Version: $next"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21" # 必要に応じて変更
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: build/libs/*.jar
